<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <!-- Ralph GitHub README banner. 1280x320 (4:1). Dark bg works on both GitHub themes. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A1A2E"/><stop offset="1" stop-color="#0E1428"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- chevron iteration motif, right side, growing rightward, faint -->
  <g transform="translate(820,128)" fill="none" stroke="#5C7FD0" stroke-linecap="round" stroke-linejoin="round" opacity="0.22">
    <path d="M 0 26 L 15 13 L 30 26" stroke-width="5.5"/>
    <path d="M 7 41 L 15 34 L 23 41" stroke-width="4.6"/>
  </g>
  <g transform="translate(900,116)" fill="none" stroke="#5C7FD0" stroke-linecap="round" stroke-linejoin="round" opacity="0.32">
    <path d="M 0 33 L 20 16 L 40 33" stroke-width="7"/>
    <path d="M 9 51 L 20 41 L 31 51" stroke-width="5.8"/>
  </g>
  <g transform="translate(1000,104)" fill="none" stroke="#5C7FD0" stroke-linecap="round" stroke-linejoin="round" opacity="0.44">
    <path d="M 0 42 L 26 18 L 52 42" stroke-width="9"/>
    <path d="M 12 64 L 26 51 L 40 64" stroke-width="7.4"/>
  </g>
  <g transform="translate(1118,90)" fill="none" stroke="#5C7FD0" stroke-linecap="round" stroke-linejoin="round" opacity="0.58">
    <path d="M 0 54 L 34 24 L 68 54" stroke-width="11.5"/>
    <path d="M 16 86 L 34 70 L 52 86" stroke-width="9.5"/>
  </g>

  <!-- tile mark -->
  <g transform="translate(90,98)">
    <rect x="0" y="0" width="124" height="124" rx="30" fill="#2E5BBA"/>
    <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 31 70 L 62 44 L 93 70" stroke-width="13.5"/>
      <path d="M 46 97 L 62 81 L 78 97" stroke-width="11"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="248" y="158" font-family="Helvetica, Arial, sans-serif" font-size="76" font-weight="700" letter-spacing="4" fill="#FFFFFF">RALPH</text>
  <text x="251" y="186" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="600" letter-spacing="5" fill="#8A93B0">RALPHLABS AI</text>

  <!-- tagline + marker -->
  <text x="92" y="250" font-family="Helvetica, Arial, sans-serif" font-size="23" font-weight="500" fill="#B8C0D8">An open training recipe that gets better, forever.</text>
  <text x="92" y="282" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="400" letter-spacing="0.5" fill="#5C7FD0">Decentralized autonomous AI research · Bittensor SN40</text>
</svg>
