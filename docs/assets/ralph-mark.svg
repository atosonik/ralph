<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Ralph mark (no wordmark). Square format for avatars, favicons,
       social profile pictures. PLACEHOLDER: the glyph below is still the
       legacy "K" letterform — pending redesign to an "R". -->
  <!-- background (remove for transparent use) -->
  <rect width="200" height="200" fill="#FFFFFF"/>
  <g transform="translate(55, 50)">
    <rect x="0" y="0" width="16" height="100" fill="#1F3A6E"/>
    <line x1="16" y1="50" x2="82" y2="0"   stroke="#1F3A6E" stroke-width="16" stroke-linecap="square"/>
    <line x1="16" y1="50" x2="82" y2="100" stroke="#2E5BBA" stroke-width="16" stroke-linecap="square"/>
    <circle cx="100" cy="50" r="6" fill="#2E5BBA"/>
  </g>
</svg>
